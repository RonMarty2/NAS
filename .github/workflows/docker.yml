name: Construir imagen Docker

# Cada vez que se sube un cambio, se construye la imagen y se publica en GHCR.
# Así el NAS solo tiene que "bajar la última versión" (1 clic en Container Manager).
on:
  push:
    branches: ["main", "claude/**"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Iniciar sesión en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y publicar la imagen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/ronmarty2/nas-organizer:latest
