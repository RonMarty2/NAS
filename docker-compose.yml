services:
  nas-organizer:
    # Imagen construida automáticamente en GitHub.
    # OJO: NO usar "pull_policy" aquí — el Container Manager de Synology lo rechaza
    # ("Additional property is not allowed"). Para actualizar, ver README/BITACORA
    # (Detener → Limpiar → borrar imagen en la pestaña Imagen → Construir).
    image: ghcr.io/ronmarty2/nas-organizer:latest
    container_name: nas-organizer
    restart: always
    ports:
      # Cambia 8678 si ese puerto ya está ocupado en tu NAS.
      - "8678:8678"
    environment:
      # --- Valores iniciales (luego se pueden editar desde la pestaña Ajustes) ---
      # Usamos las MISMAS rutas que en el NAS (gracias a montar /volume1 entero).
      # Así los movimientos son INSTANTÁNEOS (no copia) y las rutas se ven igual.
      - NAS_DOWNLOADS_DIR=/volume1/descargas
      # Raíces que verás en el navegador de carpetas al elegir destino.
      - NAS_LIBRARY_ROOTS=/volume1/video,/volume1/music
      # Carpetas preseleccionadas por defecto (puedes elegir otra en cada descarga).
      - NAS_DEFAULT_MOVIE_DIR=/volume1/video/peliculas
      - NAS_DEFAULT_SERIES_DIR=/volume1/video/series
      - NAS_DEFAULT_MUSIC_DIR=/volume1/music
      # Claves y Jellyfin (opcionales aquí, también se configuran en la web)
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - JELLYFIN_URL=${JELLYFIN_URL:-}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:-}
      - METADATA_LANGUAGE=es-MX
      - TZ=America/Mexico_City
    volumes:
      # Montamos todo /volume1 con la misma ruta dentro del contenedor. Esto hace que
      # mover de descargas a la biblioteca sea instantáneo (no copia gigabytes).
      - /volume1:/volume1
      # Datos persistentes de la app (base de datos). No lo borres.
      - ./data:/data
