services:
  nas-organizer:
    build: .
    # Si prefieres una imagen ya construida, comenta "build" y usa "image".
    container_name: nas-organizer
    restart: unless-stopped
    ports:
      # Cambia 8678 si ese puerto ya está ocupado en tu NAS.
      - "8678:8678"
    environment:
      # --- Valores iniciales (luego se pueden editar desde la pestaña Ajustes) ---
      # Rutas DENTRO del contenedor (no las del NAS). Se mapean en "volumes".
      - NAS_DOWNLOADS_DIR=/downloads
      # Raíces que verás en el desplegable para elegir dónde mover cada archivo.
      - NAS_LIBRARY_ROOTS=/video,/music
      # Carpetas preseleccionadas por defecto (puedes elegir otra en cada descarga).
      - NAS_DEFAULT_MOVIE_DIR=/video/peliculas
      - NAS_DEFAULT_SERIES_DIR=/video/series
      - NAS_DEFAULT_MUSIC_DIR=/music
      # Claves y Jellyfin (opcionales aquí, también se configuran en la web)
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - JELLYFIN_URL=${JELLYFIN_URL:-}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:-}
      - METADATA_LANGUAGE=es-ES
      - TZ=America/Mexico_City
    volumes:
      # IZQUIERDA = ruta real en tu NAS Synology. DERECHA = ruta dentro del contenedor.
      # Ajusta SOLO la parte izquierda si tus carpetas son distintas.
      - /volume1/homes/rnd261190/jdownloader:/downloads   # donde descarga JDownloader
      - /volume1/video:/video                             # biblioteca de vídeo (peliculas, series…)
      - /volume1/music:/music                             # biblioteca de música
      # Datos persistentes de la app (base de datos). No lo borres.
      - ./data:/data
