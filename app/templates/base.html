<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NAS Organizer</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <div class="brand">📦 NAS Organizer</div>
    <nav class="tabs">
      {% for key, label in tabs %}
        <a class="tab {{ 'active' if active == key else '' }}" href="/tab/{{ key }}">{{ label }}</a>
      {% endfor %}
      <a class="tab {{ 'active' if active == 'history' else '' }}" href="/history">Historial</a>
      <a class="tab {{ 'active' if active == 'settings' else '' }}" href="/settings">Ajustes</a>
    </nav>
    <form method="post" action="/scan" class="scan-form">
      <button type="submit" class="btn btn-secondary" title="Revisar la carpeta de descargas ahora">🔄 Buscar ahora</button>
    </form>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <small>Vigila tus descargas y las organiza para Jellyfin · acceso: http://IP-DE-TU-NAS:8678</small>
  </footer>

  <script>
    // Actualiza la vista previa de la ruta final al cambiar la carpeta o la subcarpeta.
    function updatePreview(sel) {
      if (!sel) return;
      var leaf = sel.getAttribute('data-leaf') || '';
      var span = document.getElementById(sel.getAttribute('data-preview'));
      var subInput = sel.form.querySelector('input[name="new_subfolder"]');
      var sub = subInput ? subInput.value.trim().replace(/^\/+|\/+$/g, '') : '';
      var path = sel.value + (sub ? '/' + sub : '') + '/' + leaf;
      if (span) span.textContent = path;
    }
  </script>
</body>
</html>
